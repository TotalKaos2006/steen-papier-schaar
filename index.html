<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <title>Steen Papier Schaar</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
    <p>Computer: <span id="computer"></span></p>
    <p>Jouw keuze: <span id="human"></span></p>
    <p>Uitslag: <span id="result"></span></p>
    <p>Score:
        <span id="winst">0</span> gewonnen /
        <span id="verlies">0</span> verloren /
        <span id="gelijk">0</span> gelijk
    </p>

    <button id="steen" data-keuze="steen">Steen</button>
    <button id="papier" data-keuze="papier">Papier</button>
    <button id="schaar" data-keuze="schaar">Schaar</button>
</div>

    <script>
        const computerOutput = document.querySelector("#computer");
        const humanOutput = document.querySelector("#human");
        const resultOutput = document.querySelector("#result");

        let humanChoice = "";
        let computerChoice = "";
        let scoreWinst = 0;
        let scoreVerlies = 0;
        let scoreGelijk = 0;

        const knoppen = document.querySelectorAll("button");

        knoppen.forEach(function(knop) {
            knop.addEventListener("click", function(event) {

                // knoppen tijdelijk uitschakelen
                knoppen.forEach(knop => knop.disabled = true);

                humanChoice = event.target.dataset.keuze;
                humanOutput.innerHTML = humanChoice;

                computerOutput.innerHTML = "?";
                resultOutput.innerHTML = "3...";

                setTimeout(function() {
                    resultOutput.innerHTML = "2...";
                }, 1000);

                setTimeout(function() {
                    resultOutput.innerHTML = "1...";
                }, 2000);

                setTimeout(function() {

                    computerChoice = computerKeuze();
                    computerOutput.innerHTML = computerChoice;

                    const uitkomst = bepaalUitkomst(humanChoice, computerChoice);
                    resultOutput.innerHTML = uitkomst;

                    switch (uitkomst) {
                        case "gewonnen":
                            scoreWinst++;
                            break;

                        case "verloren":
                            scoreVerlies++;
                            break;

                        case "gelijk":
                            scoreGelijk++;
                            break;
                    }

                    document.querySelector("#winst").innerHTML = scoreWinst;
                    document.querySelector("#verlies").innerHTML = scoreVerlies;
                    document.querySelector("#gelijk").innerHTML = scoreGelijk;

                    // knoppen terug inschakelen
                    knoppen.forEach(knop => knop.disabled = false);

                }, 3000);
            });
        });

        function computerKeuze() {
            let randomNumber = Math.floor(Math.random() * 3) + 1;

            switch (randomNumber) {
                case 1:
                    return "steen";
                case 2:
                    return "papier";
                default:
                    return "schaar";
            }
        }

        function bepaalUitkomst(speler, computer) {
            if (speler === computer) {
                return "gelijk";
            }

            switch (speler) {
                case "steen":
                    return computer === "schaar" ? "gewonnen" : "verloren";

                case "papier":
                    return computer === "steen" ? "gewonnen" : "verloren";

                case "schaar":
                    return computer === "papier" ? "gewonnen" : "verloren";
            }
        }
    </script>

</body>
</html>
